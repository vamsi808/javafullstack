spring.application.name=backend

# ---------------------------------------------------------------------------
# SPRING BOOT DATASOURCE CONFIGURATION EXAMPLES
# ---------------------------------------------------------------------------

# Uncomment ONE of the below configurations depending on your database engine.
# Ensure you also add the correct dependency driver to your pom.xml file:
#   - PostgreSQL: org.postgresql/postgresql
#   - MySQL: mysql/mysql-connector-java
# ---------------------------------------------------------------------------


# ==========================================
# 1. POSTGRESQL CONFIGURATION
# ==========================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/freshdeskdb
# spring.datasource.username=postgres
# spring.datasource.password=your_secure_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ==========================================
# 2. MYSQL / MARIADB CONFIGURATION
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/freshdeskdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# ==========================================
# 3. DEFAULT H2 IN-MEMORY CONFIGURATION (Current)
# ==========================================
# spring.datasource.url=jdbc:h2:mem:freshdeskdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console


# ---------------------------------------------------------------------------
# JPA/HIBERNATE SETTINGS (Applies to all)
# ---------------------------------------------------------------------------
# Set to 'update' to automatically modify tables based on Java Entities
# Set to 'validate' in production!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
