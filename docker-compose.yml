services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      # Use host.docker.internal to talk to the native MySQL on the EC2 host
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/freshdeskdb
      SPRING_DATASOURCE_USERNAME: springuser
      SPRING_DATASOURCE_PASSWORD: SpringUser123!
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
